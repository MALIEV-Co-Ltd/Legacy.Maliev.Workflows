name: publish-image

on:
  workflow_call:
    inputs:
      image:
        description: Full Artifact Registry image name without a tag or digest
        required: true
        type: string
      dockerfile:
        description: Dockerfile path relative to the caller repository
        required: true
        type: string
      context:
        description: Docker build context relative to the caller repository
        required: true
        type: string
      environment:
        description: Protected GitHub environment authorized for publication
        required: true
        type: string
      workload-identity-provider:
        description: Google Workload Identity Federation provider resource name
        required: true
        type: string
      service-account:
        description: Google service account authorized to publish the image
        required: true
        type: string
      maliev-aspire-ref:
        description: Optional immutable Maliev.Aspire commit required by the caller Docker context
        required: false
        default: ""
        type: string
      messaging-contracts-ref:
        description: Optional immutable Maliev.MessagingContracts commit required by the caller Docker context
        required: false
        default: ""
        type: string
      legacy-service-defaults-ref:
        description: Optional immutable Legacy.Maliev.ServiceDefaults commit required by the caller Docker context
        required: false
        default: ""
        type: string
      compatibility-contracts-ref:
        description: Optional immutable Legacy.Maliev.CompatibilityContracts commit required by the caller Docker context
        required: false
        default: ""
        type: string
    outputs:
      digest:
        description: Published immutable image digest
        value: ${{ jobs.publish.outputs.digest }}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: >-
      github.ref == 'refs/heads/main' &&
      github.ref_protected == true &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
    steps:
      - name: Check out caller repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Validate optional dependency commits
        shell: bash
        env:
          MALIEV_ASPIRE_REF: ${{ inputs.maliev-aspire-ref }}
          MESSAGING_CONTRACTS_REF: ${{ inputs.messaging-contracts-ref }}
          LEGACY_SERVICE_DEFAULTS_REF: ${{ inputs.legacy-service-defaults-ref }}
          COMPATIBILITY_CONTRACTS_REF: ${{ inputs.compatibility-contracts-ref }}
        run: |
          set -euo pipefail
          if [[ -n "$MALIEV_ASPIRE_REF" && ! "$MALIEV_ASPIRE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "maliev-aspire-ref must be an immutable 40-character commit" >&2
            exit 1
          fi
          if [[ -n "$MESSAGING_CONTRACTS_REF" && ! "$MESSAGING_CONTRACTS_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "messaging-contracts-ref must be an immutable 40-character commit" >&2
            exit 1
          fi
          if [[ -n "$LEGACY_SERVICE_DEFAULTS_REF" && ! "$LEGACY_SERVICE_DEFAULTS_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "legacy-service-defaults-ref must be an immutable 40-character commit" >&2
            exit 1
          fi
          if [[ -n "$COMPATIBILITY_CONTRACTS_REF" && ! "$COMPATIBILITY_CONTRACTS_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "compatibility-contracts-ref must be an immutable 40-character commit" >&2
            exit 1
          fi

      - name: Check out pinned Maliev.Aspire dependency
        if: ${{ inputs.maliev-aspire-ref != '' }}
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: MALIEV-Co-Ltd/Maliev.Aspire
          ref: ${{ inputs.maliev-aspire-ref }}
          path: .dependencies/Maliev.Aspire
          persist-credentials: false

      - name: Check out pinned messaging contracts dependency
        if: ${{ inputs.messaging-contracts-ref != '' }}
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: MALIEV-Co-Ltd/Maliev.MessagingContracts
          ref: ${{ inputs.messaging-contracts-ref }}
          path: .dependencies/Maliev.MessagingContracts
          persist-credentials: false

      - name: Check out pinned legacy service defaults dependency
        if: ${{ inputs.legacy-service-defaults-ref != '' }}
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.ServiceDefaults
          ref: ${{ inputs.legacy-service-defaults-ref }}
          path: .dependencies/Legacy.Maliev.ServiceDefaults
          persist-credentials: false

      - name: Check out pinned legacy compatibility contracts dependency
        if: ${{ inputs.compatibility-contracts-ref != '' }}
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.CompatibilityContracts
          ref: ${{ inputs.compatibility-contracts-ref }}
          path: .dependencies/Legacy.Maliev.CompatibilityContracts
          persist-credentials: false

      - name: Prepare immutable image tag
        shell: bash
        env:
          IMAGE: ${{ inputs.image }}
        run: |
          set -euo pipefail
          if [[ "$IMAGE" != */* || "$IMAGE" == *:* || "$IMAGE" == *@* ]]; then
            echo "image must be a full registry image name without a tag or digest" >&2
            exit 1
          fi
          IMAGE_REGISTRY="${IMAGE%%/*}"
          echo "IMAGE_REGISTRY=$IMAGE_REGISTRY" >> "$GITHUB_ENV"
          echo "COMMIT_TAG=$IMAGE:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud with workload identity
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          token_format: access_token
          create_credentials_file: false
          workload_identity_provider: ${{ inputs.workload-identity-provider }}
          service_account: ${{ inputs.service-account }}

      - name: Sign in to Artifact Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image once for scanning and publication
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          tags: ${{ inputs.image }}:${{ github.sha }}

      - name: Scan the built image before publication
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.COMMIT_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Publish and resolve immutable digest
        id: publish
        shell: bash
        env:
          IMAGE: ${{ inputs.image }}
        run: |
          set -euo pipefail
          docker push "$COMMIT_TAG"
          DIGEST="$(docker buildx imagetools inspect "$COMMIT_TAG" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "registry returned an invalid image digest" >&2
            exit 1
          fi
          IMAGE_REFERENCE="${IMAGE}@${DIGEST}"
          echo "Published ${IMAGE_REFERENCE}"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

name: Validate .NET solution
description: Restore, build, test, format-check, and audit a .NET solution without publishing artifacts.

inputs:
  solution:
    description: Path to the solution or solution filter to validate.
    required: true
  working-directory:
    description: Directory from which validation commands run.
    required: false
    default: .
  dotnet-version:
    description: .NET SDK version installed for validation.
    required: false
    default: 10.0.x

runs:
  using: composite
  steps:
    - name: Set up .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Cache NuGet packages
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj', '**/*.props') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install Gitleaks
      shell: bash
      run: |
        go install github.com/zricethezav/gitleaks/v8@6eaad039603a4de39fddd1cf5f727391efe9974e # v8.30.0
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Scan repository for leaked secrets
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: gitleaks git --redact --exit-code 1

    - name: Restore
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: dotnet restore "${{ inputs.solution }}"

    - name: Build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: dotnet build "${{ inputs.solution }}" --configuration Release --no-restore

    - name: Test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: dotnet test "${{ inputs.solution }}" --configuration Release --no-build --no-restore

    - name: Verify formatting
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: dotnet format "${{ inputs.solution }}" --verify-no-changes --no-restore

    - name: Audit vulnerable packages
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: dotnet list "${{ inputs.solution }}" package --vulnerable --include-transitive --no-restore
